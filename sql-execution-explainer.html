<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Execution Order — Explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117;
  --surface: #161b27;
  --surface2: #1e2535;
  --border: #2a3147;
  --border2: #3a4560;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #525d72;
  --accent: #4f8ef7;
  --accent-dim: #1a2e52;
  --accent-text: #a0c2ff;
  --green: #2dd4a0;
  --green-dim: #0d2e22;
  --amber: #f5a623;
  --amber-dim: #2e1f09;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
  --r: 8px;
  --rl: 12px;
  --hh: 50px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; overflow: hidden; }

/* ── Header ── */
header {
  height: var(--hh);
  border-bottom: 1px solid var(--border);
  padding: 0 1.25rem;
  display: flex; align-items: center; gap: 10px;
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(14,17,23,0.96);
  backdrop-filter: blur(10px);
  z-index: 300;
}
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent-text); letter-spacing: 0.04em; }
.logo span { color: var(--text2); }
.badge { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: var(--accent-dim); color: var(--accent-text); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--accent); }
.hdr-sep { flex: 1; }
.hdr-btns { display: flex; gap: 6px; }

/* ── 3-col shell ── */
.shell {
  position: fixed;
  top: var(--hh); left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  overflow: hidden;
}

/* ── Shared column style ── */
.col {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.col:last-child { border-right: none; }

.col-head {
  flex-shrink: 0;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; gap: 8px;
}
.col-title { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3); }
.col-tag { font-family: var(--mono); font-size: 10px; color: var(--accent-text); background: var(--accent-dim); border: 1px solid rgba(79,142,247,0.25); padding: 1px 7px; border-radius: 3px; margin-left: auto; }
.col-body { flex: 1; overflow-y: auto; padding: 0; }

/* ── LEFT COL: reference accordion ── */
.ref-section { border-bottom: 1px solid var(--border); }
.ref-section:last-child { border-bottom: none; }

.ref-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  background: var(--surface);
  transition: background 0.12s;
  position: sticky; top: 0; z-index: 1;
}
.ref-head:hover { background: var(--surface2); }
.ref-section.open .ref-head { background: var(--surface2); }

.ref-num {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--border2);
  color: var(--text3);
}
.ref-section.active-exec .ref-num { background: var(--accent-dim); color: var(--accent-text); border-color: var(--accent); }

.ref-label { font-size: 12.5px; font-weight: 500; color: var(--text2); flex: 1; }
.ref-section.active-exec .ref-label { color: var(--text); }

.ref-exec-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--accent-dim);
  color: var(--accent-text);
  border: 1px solid rgba(79,142,247,0.2);
  white-space: nowrap;
}

.ref-chev { color: var(--text3); transition: transform 0.18s; flex-shrink: 0; }
.ref-section.open .ref-chev { transform: rotate(180deg); }

.ref-body { display: none; padding: 0 0 10px; }
.ref-section.open .ref-body { display: block; }

.ref-rows { width: 100%; border-collapse: collapse; }
.ref-rows tr { border-bottom: 1px solid var(--border); }
.ref-rows tr:last-child { border-bottom: none; }
.ref-rows td { padding: 7px 14px; font-size: 12px; vertical-align: top; }
.ref-op { font-family: var(--mono); font-size: 11px; color: var(--accent-text); white-space: nowrap; }
.ref-desc { color: var(--text2); line-height: 1.5; }
.ref-ex { font-family: var(--mono); font-size: 10.5px; color: var(--green); display: block; margin-top: 2px; opacity: 0.85; }

/* ── CENTER COL: editor ── */
.editor-wrap { padding: 14px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
textarea {
  flex: 1;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.75;
  padding: 14px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  outline: none;
  resize: none;
  tab-size: 2;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--border2); }
textarea::placeholder { color: var(--text3); }
.btns { display: flex; gap: 7px; flex-wrap: wrap; }
button {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  cursor: pointer; padding: 6px 13px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
  transition: all 0.13s;
}
button:hover { border-color: var(--text2); color: var(--text); background: var(--surface2); }
button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
button.primary:hover { background: #6a9fff; }
button.primary:active { transform: scale(0.97); }
button svg { vertical-align: -2px; margin-right: 3px; }

/* ── RIGHT COL: execution steps ── */
.exec-list { padding: 14px; display: flex; flex-direction: column; gap: 0; }

.exec-block {
  border: 1px solid var(--border2);
  border-radius: var(--rl);
  overflow: hidden;
  background: var(--surface);
}

.exec-block + .exec-block { margin-top: 0; }

.exec-sep {
  display: flex; align-items: stretch;
  padding-left: 22px;
  height: 26px;
}
.exec-sep-inner {
  display: flex; flex-direction: column; align-items: center; width: 1px;
}
.exec-sep-line { flex: 1; width: 1px; background: var(--border2); }
.exec-sep-arrow {
  width: 0; height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 5px solid var(--border2);
}

.exec-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.exec-seq {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: var(--accent-dim); color: var(--accent-text);
  border: 1px solid var(--accent);
}
.exec-name { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; }
.exec-kw {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent-text); background: var(--accent-dim);
  border: 1px solid rgba(79,142,247,0.25);
  padding: 2px 9px; border-radius: 4px;
}
.exec-body { padding: 12px 14px 14px; }
.exec-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
.exec-snippet {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 9px 13px;
}
.exec-snippet-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 600; margin-bottom: 4px; }
.exec-snippet code { font-family: var(--mono); font-size: 12.5px; color: var(--accent-text); white-space: pre-wrap; word-break: break-all; display: block; }
.exec-tip {
  margin-top: 9px; padding: 8px 12px;
  background: var(--amber-dim);
  border: 1px solid rgba(245,166,35,0.18);
  border-radius: var(--r);
  font-size: 12px; color: #c89040; line-height: 1.55;
}

/* empty */
.empty-ex {
  text-align: center; padding: 3rem 1rem;
  border: 1px dashed var(--border2);
  border-radius: var(--rl);
  color: var(--text3); font-size: 13px; line-height: 2;
}
.empty-ex svg { display: block; margin: 0 auto 10px; opacity: 0.35; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr 1fr; }
  .col:last-child { display: none; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <span class="logo">SQL<span>.</span>exec</span>
  <span class="badge">3-Panel Explainer</span>
  <span class="hdr-sep"></span>
  <div class="hdr-btns">
    <button onclick="loadExample('basic')">Esempio base</button>
    <button onclick="loadExample('join')">JOIN</button>
    <button onclick="loadExample('window')">Window fn</button>
    <button onclick="loadExample('master')">Query master</button>
    <button onclick="clearAll()">Pulisci</button>
  </div>
</header>

<div class="shell">

  <!-- ══ LEFT: Reference ══ -->
  <div class="col" id="col-left">
    <div class="col-head">
      <span class="col-title">Riferimento SQL</span>
      <span class="col-tag">scrittura</span>
    </div>
    <div class="col-body" id="ref-body">
      <!-- JS popola qui -->
    </div>
  </div>

  <!-- ══ CENTER: Editor ══ -->
  <div class="col">
    <div class="col-head">
      <span class="col-title">La tua query</span>
      <span class="col-tag">query.sql</span>
    </div>
    <div class="col-body">
      <div class="editor-wrap">
        <textarea id="sql" spellcheck="false" placeholder="-- Incolla o scrivi qui la tua query SQL..."></textarea>
        <div class="btns">
          <button class="primary" onclick="analyze()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Analizza
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT: Execution ══ -->
  <div class="col">
    <div class="col-head">
      <span class="col-title">Ordine di esecuzione</span>
      <span class="col-tag">runtime</span>
    </div>
    <div class="col-body">
      <div class="exec-list" id="exec-list">
        <div class="empty-ex">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 10h16M4 14h10M4 18h6"/></svg>
          Premi <strong>Analizza</strong> per vedere<br>l'ordine reale di esecuzione.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════
   REFERENCE DATA  (ordine di scrittura)
   ════════════════════════════════════════════════ */
const REF = [
  {
    id: 'cte', label: 'WITH (CTE)', execOrder: 0,
    rows: [
      { op: 'WITH ... AS (...)', desc: 'Definisce un result set temporaneo con nome, usabile nella query principale', ex: 'WITH clienti_attivi AS (SELECT * FROM clienti WHERE età >= 18)' },
      { op: 'WITH multipla', desc: 'Permette di definire più CTE separate da virgola', ex: 'WITH cte1 AS (...), cte2 AS (...) SELECT * FROM cte1 JOIN cte2 ON ...' },
    ]
  },
  {
    id: 'select', label: 'SELECT', execOrder: 6,
    rows: [
      { op: 'SELECT *', desc: 'Seleziona tutte le colonne', ex: 'SELECT * FROM clienti' },
      { op: 'DISTINCT', desc: 'Mostra solo valori unici', ex: 'SELECT DISTINCT città FROM clienti' },
      { op: 'AS', desc: 'Rinomina una colonna nel risultato', ex: 'SELECT nome AS nome_cliente FROM clienti' },
      { op: 'COUNT()', desc: 'Conta le righe o i valori non nulli', ex: 'SELECT COUNT(*) FROM clienti' },
      { op: 'SUM()', desc: 'Somma i valori numerici', ex: 'SELECT SUM(importo) FROM ordini' },
      { op: 'AVG()', desc: 'Calcola la media', ex: 'SELECT AVG(prezzo) FROM prodotti' },
      { op: 'MIN()', desc: 'Trova il valore minimo', ex: 'SELECT MIN(prezzo) FROM prodotti' },
      { op: 'MAX()', desc: 'Trova il valore massimo', ex: 'SELECT MAX(prezzo) FROM prodotti' },
      { op: 'LENGTH()', desc: 'Restituisce la lunghezza di una stringa', ex: 'SELECT LENGTH(nome) FROM clienti' },
      { op: 'LEFT()', desc: 'Estrae i primi N caratteri da sinistra', ex: 'SELECT LEFT(nome, 3) FROM clienti' },
      { op: 'RIGHT()', desc: 'Estrae gli ultimi N caratteri da destra', ex: 'SELECT RIGHT(telefono, 3) FROM clienti' },
      { op: 'SUBSTRING()', desc: 'Estrae una parte della stringa da una posizione data', ex: 'SELECT SUBSTRING(nome, 1, 3) FROM clienti' },
      { op: 'POSITION()', desc: 'Restituisce la posizione di una sottostringa', ex: "SELECT POSITION('@' IN email) FROM clienti" },
      { op: 'UPPER()', desc: 'Trasforma il testo in maiuscolo', ex: 'SELECT UPPER(nome) FROM clienti' },
      { op: 'LOWER()', desc: 'Trasforma il testo in minuscolo', ex: 'SELECT LOWER(email) FROM clienti' },
      { op: 'CONCAT()', desc: 'Unisce più stringhe in una sola', ex: "SELECT CONCAT(nome, ' ', cognome) FROM clienti" },
      { op: 'CONCAT_WS()', desc: 'Unisce più stringhe con separatore', ex: "SELECT CONCAT_WS(' ', nome, cognome) FROM clienti" },
      { op: 'CAST()', desc: 'Converte un valore in un altro tipo', ex: 'SELECT CAST(prezzo AS INT) FROM prodotti' },
      { op: 'COALESCE()', desc: 'Restituisce il primo valore non NULL', ex: "SELECT COALESCE(telefono, email, 'N/D') FROM clienti" },
      { op: 'EXTRACT()', desc: 'Estrae una parte da una data o timestamp', ex: 'SELECT EXTRACT(MONTH FROM data_ordine) FROM ordini' },
      { op: 'CASE WHEN', desc: 'Applica logica condizionale', ex: "SELECT CASE WHEN prezzo > 100 THEN 'Alto' ELSE 'Basso' END FROM prodotti" },
    ]
  },
  {
    id: 'window', label: 'WINDOW functions', execOrder: 5,
    rows: [
      { op: 'ROW_NUMBER() OVER(...)', desc: 'Numera le righe in sequenza dentro una finestra', ex: 'ROW_NUMBER() OVER (ORDER BY importo DESC) AS rn' },
      { op: 'RANK() OVER(...)', desc: 'Assegna un rango, con salti in caso di parità', ex: 'RANK() OVER (ORDER BY importo DESC) AS rk' },
      { op: 'DENSE_RANK()', desc: 'Assegna un rango senza salti', ex: 'DENSE_RANK() OVER (ORDER BY importo DESC)' },
      { op: 'PARTITION BY', desc: 'Divide il risultato in partizioni per calcoli indipendenti', ex: 'ROW_NUMBER() OVER (PARTITION BY cliente_id ORDER BY importo DESC)' },
      { op: 'ORDER BY in OVER()', desc: "Definisce l'ordine interno della finestra", ex: 'SUM(importo) OVER (PARTITION BY cliente_id ORDER BY data_ordine)' },
      { op: 'LAG()', desc: 'Accede al valore della riga precedente', ex: 'LAG(importo, 1) OVER (ORDER BY data_ordine)' },
      { op: 'LEAD()', desc: 'Accede al valore della riga successiva', ex: 'LEAD(importo, 1) OVER (ORDER BY data_ordine)' },
    ]
  },
  {
    id: 'from', label: 'FROM', execOrder: 1,
    rows: [
      { op: 'FROM tabella', desc: 'Definisce la tabella di partenza', ex: 'FROM clienti' },
      { op: 'FROM alias', desc: 'Assegna un nome breve alla tabella', ex: 'FROM clienti c' },
      { op: 'FROM subquery', desc: 'Usa una query come tabella temporanea', ex: 'FROM (SELECT * FROM clienti) c' },
    ]
  },
  {
    id: 'join', label: 'JOIN', execOrder: 1,
    rows: [
      { op: 'INNER JOIN', desc: 'Tiene solo le righe con corrispondenza in entrambe le tabelle', ex: 'INNER JOIN ordini o ON c.id = o.cliente_id' },
      { op: 'LEFT JOIN', desc: 'Tiene tutte le righe della tabella sinistra e le corrispondenze della destra', ex: 'LEFT JOIN ordini o ON c.id = o.cliente_id' },
      { op: 'RIGHT JOIN', desc: 'Tiene tutte le righe della tabella destra e le corrispondenze della sinistra', ex: 'RIGHT JOIN ordini o ON c.id = o.cliente_id' },
      { op: 'FULL OUTER JOIN', desc: 'Tiene tutte le righe di entrambe le tabelle', ex: 'FULL OUTER JOIN ordini o ON c.id = o.cliente_id' },
      { op: 'CROSS JOIN', desc: 'Genera tutte le combinazioni possibili', ex: 'CROSS JOIN categorie' },
      { op: 'ON', desc: 'Definisce la condizione di collegamento', ex: 'ON c.id = o.cliente_id' },
      { op: 'USING()', desc: 'Collega usando una colonna con lo stesso nome', ex: 'JOIN ordini USING(cliente_id)' },
    ]
  },
  {
    id: 'where', label: 'WHERE', execOrder: 2,
    rows: [
      { op: '= / <> / > / < / >= / <=', desc: 'Operatori di confronto', ex: "WHERE città = 'Roma'  |  WHERE prezzo > 100" },
      { op: 'AND / OR / NOT', desc: 'Operatori logici per combinare condizioni', ex: "WHERE città = 'Roma' AND età >= 18" },
      { op: 'IN (...)', desc: 'Controlla se un valore è in una lista', ex: "WHERE città IN ('Roma','Milano','Napoli')" },
      { op: 'BETWEEN ... AND ...', desc: 'Controlla se un valore è in un intervallo', ex: 'WHERE prezzo BETWEEN 10 AND 50' },
      { op: 'LIKE', desc: 'Cerca un pattern in una stringa (% = qualsiasi sequenza)', ex: "WHERE nome LIKE 'A%'" },
      { op: 'IS NULL / IS NOT NULL', desc: 'Trova valori nulli o non nulli', ex: 'WHERE telefono IS NULL' },
      { op: 'EXISTS (...)', desc: 'Verifica se una sottoquery restituisce righe', ex: 'WHERE EXISTS (SELECT 1 FROM ordini o WHERE o.cliente_id = c.id)' },
    ]
  },
  {
    id: 'groupby', label: 'GROUP BY', execOrder: 3,
    rows: [
      { op: 'GROUP BY colonna', desc: 'Raggruppa per una colonna', ex: 'GROUP BY città' },
      { op: 'GROUP BY più colonne', desc: 'Raggruppa per più colonne', ex: 'GROUP BY città, categoria' },
    ]
  },
  {
    id: 'having', label: 'HAVING', execOrder: 4,
    rows: [
      { op: 'HAVING COUNT()', desc: 'Filtra gruppi in base al conteggio', ex: 'HAVING COUNT(*) > 5' },
      { op: 'HAVING SUM()', desc: 'Filtra gruppi in base alla somma', ex: 'HAVING SUM(importo) > 1000' },
      { op: 'HAVING AVG()', desc: 'Filtra gruppi in base alla media', ex: 'HAVING AVG(prezzo) < 50' },
    ]
  },
  {
    id: 'orderby', label: 'ORDER BY', execOrder: 7,
    rows: [
      { op: 'ORDER BY ASC', desc: 'Ordina in modo crescente (default)', ex: 'ORDER BY nome ASC' },
      { op: 'ORDER BY DESC', desc: 'Ordina in modo decrescente', ex: 'ORDER BY prezzo DESC' },
      { op: 'ORDER BY più colonne', desc: 'Ordina usando più campi', ex: 'ORDER BY città ASC, nome DESC' },
    ]
  },
  {
    id: 'limit', label: 'LIMIT / OFFSET', execOrder: 8,
    rows: [
      { op: 'LIMIT n', desc: 'Mostra solo le prime n righe', ex: 'LIMIT 10' },
      { op: 'LIMIT n OFFSET m', desc: 'Salta le prime m righe, poi prende n', ex: 'LIMIT 10 OFFSET 20' },
    ]
  },
  {
    id: 'union', label: 'UNION', execOrder: null,
    rows: [
      { op: 'UNION', desc: 'Unisce due risultati senza duplicati', ex: 'SELECT nome FROM clienti UNION SELECT nome FROM fornitori' },
      { op: 'UNION ALL', desc: 'Unisce due risultati con duplicati', ex: 'SELECT nome FROM clienti UNION ALL SELECT nome FROM fornitori' },
    ]
  },
  {
    id: 'dml', label: 'INSERT / UPDATE / DELETE', execOrder: null,
    rows: [
      { op: 'INSERT INTO ... VALUES', desc: 'Inserisce una nuova riga', ex: "INSERT INTO clienti (nome, città) VALUES ('Mario', 'Roma')" },
      { op: 'INSERT ... SELECT', desc: 'Inserisce righe prese da una query', ex: 'INSERT INTO archivio_clienti SELECT * FROM clienti' },
      { op: 'UPDATE ... SET', desc: 'Aggiorna una o più colonne', ex: "UPDATE clienti SET città = 'Milano' WHERE id = 1" },
      { op: 'DELETE FROM ... WHERE', desc: 'Elimina le righe filtrate', ex: 'DELETE FROM clienti WHERE età < 18' },
    ]
  },
  {
    id: 'ddl', label: 'CREATE / ALTER / DROP', execOrder: null,
    rows: [
      { op: 'CREATE TABLE', desc: 'Crea una nuova tabella', ex: 'CREATE TABLE clienti (id INT, nome TEXT)' },
      { op: 'ALTER TABLE ... ADD COLUMN', desc: 'Aggiunge una colonna', ex: 'ALTER TABLE clienti ADD email TEXT' },
      { op: 'ALTER TABLE ... RENAME', desc: 'Rinomina tabella o colonna', ex: 'ALTER TABLE clienti RENAME TO clienti_attivi' },
      { op: 'DROP TABLE', desc: 'Elimina una tabella', ex: 'DROP TABLE clienti' },
    ]
  },
];

/* ════════════════════════════════════════════════
   EXECUTION STEPS (ordine motore SQL)
   ════════════════════════════════════════════════ */
const EXEC_STEPS = [
  {
    id: 'cte',
    label: 'WITH (CTE)',
    kw: 'WITH',
    keywords: [/^\s*WITH\b/i],
    extractFn: (sql) => getClause(sql, 'cte'),
    desc: 'Le CTE vengono valutate per prime e creano result set temporanei riutilizzabili nella query principale. Ogni CTE è come una tabella virtuale con un nome.',
    tip: null
  },
  {
    id: 'from',
    label: 'FROM / JOIN',
    kw: 'FROM',

    kw: 'GROUP BY',

    extractFn: (sql) => extractWindowFunctions(sql),
    desc: 'Le window functions vengono calcolate dopo HAVING ma prima che SELECT produca il risultato finale. Non collassano le righe: ogni riga mantiene la sua identità.',

/* ════════════════════════════════════════════════
   EXTRACT HELPERS — paren-aware SQL splitter
   Tracks parenthesis depth so keywords inside CTEs
   or subqueries are ignored. Only depth-0 keywords
   are treated as top-level clause boundaries.
   ════════════════════════════════════════════════ */

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/**
 * Tokenise sql into an array of {pos, kw} for every top-level
 * (depth-0) keyword match of the given regex.
 */
function topLevelMatches(sql, re) {
  const hits = [];
  let depth = 0;
  let i = 0;
  while (i < sql.length) {
    const ch = sql[i];
    if (ch === '(') { depth++; i++; continue; }
    if (ch === ')') { depth--; i++; continue; }
    // skip single-quoted strings
    if (ch === "'") {
      i++;
      while (i < sql.length && sql[i] !== "'") {
        if (sql[i] === '\\') i++;
        i++;
      }
      i++; continue;
    }
    // skip double-quoted identifiers
    if (ch === '"') {
      i++;
      while (i < sql.length && sql[i] !== '"') i++;
      i++; continue;
    }
    // skip -- line comments
    if (ch === '-' && sql[i+1] === '-') {
      while (i < sql.length && sql[i] !== '\n') i++;
      continue;
    }
    if (depth === 0) {
      const slice = sql.slice(i);
      const m = slice.match(re);
      if (m && m.index === 0) {
        hits.push({ pos: i, kw: m[0] });
        i += m[0].length;
        continue;
      }
    }
    i++;
  }
  return hits;
}

/**
 * Split the SQL into top-level clause segments.
 * Returns an object keyed by clause id.
 */
const TOP_CLAUSES = [
  { id: 'cte',     re: /WITH\b/i },
  { id: 'select',  re: /SELECT\b/i },
  { id: 'from',    re: /FROM\b/i },
  { id: 'where',   re: /WHERE\b/i },
  { id: 'groupby', re: /GROUP\s+BY\b/i },
  { id: 'having',  re: /HAVING\b/i },
  { id: 'orderby', re: /ORDER\s+BY\b/i },
  { id: 'limit',   re: /LIMIT\b/i },
];

function splitTopLevel(sql) {
  // Collect all top-level keyword hits with their clause id
  const all = [];
  TOP_CLAUSES.forEach(def => {
    // build a word-boundary regex
    const re = new RegExp('\\b' + def.re.source + '', 'i');
    topLevelMatches(sql, re).forEach(hit => {
      all.push({ id: def.id, pos: hit.pos });
    });
  });
  all.sort((a, b) => a.pos - b.pos);

  // Deduplicate: keep first occurrence of each clause id
  const seen = new Set();
  const unique = all.filter(h => {
    if (seen.has(h.id)) return false;
    seen.add(h.id); return true;
  });

  // Slice text between boundaries
  const result = {};
  unique.forEach((clause, i) => {
    const end = i + 1 < unique.length ? unique[i+1].pos : sql.length;
    result[clause.id] = sql.slice(clause.pos, end).trimEnd();
  });
  return result;
}

function getClause(sql, id) {
  const parts = splitTopLevel(sql);
  return parts[id] || null;
}

function extractWindowFunctions(sql) {
  // Extract lines with OVER() from the main SELECT block only
  const sel = getClause(sql, 'select');
  if (!sel) return null;
  const lines = sel.split('\n');
  const win = lines.filter(l =>
    /\bOVER\s*\(/i.test(l) ||
    /\b(ROW_NUMBER|RANK|DENSE_RANK|LAG|LEAD|NTILE|CUME_DIST)\b/i.test(l)
  );
  return win.length ? win.join('\n').trim() : null;
}

/* ════════════════════════════════════════════════
   BUILD LEFT COLUMN
   ════════════════════════════════════════════════ */
function buildRef(activeSql) {
  const container = document.getElementById('ref-body');
  container.innerHTML = '';

  REF.forEach(section => {
    const found = activeSql ? section.rows.some(r => {
      // rough check: exec step present?
      const step = EXEC_STEPS.find(s => s.id === section.id);
      return step ? step.keywords.some(kw => kw.test(activeSql)) : false;
    }) : false;

    const execLabel = section.execOrder !== null
      ? `exec #${section.execOrder + 1}`
      : null;

    const div = document.createElement('div');
    div.className = 'ref-section' + (found ? ' active-exec' : '');
    div.id = 'ref-' + section.id;

    div.innerHTML = `
      <div class="ref-head" onclick="toggleRef('${section.id}')">
        <span class="ref-num">${section.execOrder !== null ? section.execOrder + 1 : '·'}</span>
        <span class="ref-label">${section.label}</span>
        ${execLabel ? `<span class="ref-exec-badge">${execLabel}</span>` : ''}
        <svg class="ref-chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="ref-body">
        <table class="ref-rows">
          ${section.rows.map(r => `
            <tr>
              <td class="ref-op">${escHtml(r.op)}</td>
              <td class="ref-desc">${escHtml(r.desc)}<span class="ref-ex">${escHtml(r.ex)}</span></td>
            </tr>
          `).join('')}
        </table>
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleRef(id) {
  const el = document.getElementById('ref-' + id);
  if (el) el.classList.toggle('open');
}

/* ════════════════════════════════════════════════
   ANALYZE
   ════════════════════════════════════════════════ */
function analyze() {
  const sql = document.getElementById('sql').value.trim();
  const execList = document.getElementById('exec-list');

  buildRef(sql);

  if (!sql) {
    execList.innerHTML = emptyHTML('Scrivi o incolla una query SQL e premi Analizza.');
    return;
  }

  // Pre-extract all snippets: a step is present only if it extracts real content
  const extracted = {};
  EXEC_STEPS.forEach(s => {
    const text = s.extractFn(sql);
    extracted[s.id] = (text && text.trim()) ? text : null;
  });

  const found = EXEC_STEPS.filter(s => extracted[s.id] !== null);
  if (!found.length) {
    execList.innerHTML = emptyHTML('Nessuna clausola SQL riconosciuta.<br>Prova con una SELECT standard.');
    return;
  }

  let html = '';
  let seq = 0;

  EXEC_STEPS.forEach((step, i) => {
    const snippet = extracted[step.id];
    if (!snippet) return;

    seq++;

    if (html !== '') {
      html += `<div class="exec-sep"><div class="exec-sep-inner"><div class="exec-sep-line"></div><div class="exec-sep-arrow"></div></div></div>`;
    }

    html += `<div class="exec-block" id="exec-${step.id}">
      <div class="exec-head">
        <div class="exec-seq">${seq}</div>
        <div class="exec-name">${step.label}</div>
        <div class="exec-kw">${step.kw}</div>
      </div>
      <div class="exec-body">
        <p class="exec-desc">${step.desc}</p>
        ${snippet ? `<div class="exec-snippet">
          <div class="exec-snippet-lbl">estratto dalla tua query</div>
          <code>${escHtml(snippet)}</code>
        </div>` : ''}
        ${step.tip ? `<div class="exec-tip">${step.tip}</div>` : ''}
      </div>
    </div>`;
  });

  execList.innerHTML = html;
}

function emptyHTML(msg) {
  return `<div class="empty-ex">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    ${msg}
  </div>`;
}

function clearAll() {
  document.getElementById('sql').value = '';
  document.getElementById('exec-list').innerHTML = emptyHTML('Premi <strong>Analizza</strong> per vedere<br>l\'ordine reale di esecuzione.');
  buildRef('');
}

/* ════════════════════════════════════════════════
   EXAMPLES
   ════════════════════════════════════════════════ */
const EXAMPLES = {
  basic:
`SELECT department, AVG(salary) AS media_sal
FROM employees
WHERE hire_date > '2020-01-01'
GROUP BY department
HAVING AVG(salary) > 50000
ORDER BY media_sal DESC
LIMIT 5`,

  join:
`SELECT c.nome, COUNT(o.id) AS num_ordini, SUM(o.importo) AS totale
FROM clienti c
INNER JOIN ordini o ON c.id = o.cliente_id
WHERE o.status = 'completed'
GROUP BY c.nome
HAVING COUNT(o.id) >= 3
ORDER BY totale DESC
LIMIT 10`,

  window:
`SELECT
  employee_id,
  department,
  salary,
  ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) AS rank_dept,
  AVG(salary) OVER (PARTITION BY department) AS avg_dept
FROM employees
WHERE active = 1
ORDER BY department, rank_dept`,

  master:
`WITH clienti_filtrati AS (
  SELECT id, nome, cognome, città, età, email, telefono
  FROM clienti
  WHERE età >= 18
    AND città IN ('Roma', 'Milano', 'Napoli')
),
ordini_base AS (
  SELECT
    o.id, o.cliente_id, o.importo, o.data_ordine,
    ROW_NUMBER() OVER (
      PARTITION BY o.cliente_id
      ORDER BY o.importo DESC
    ) AS rn_importo
  FROM ordini o
  WHERE o.importo > 10
)
SELECT
  c.id AS cliente_id,
  UPPER(c.nome) AS nome_upper,
  CONCAT(c.nome, ' ', c.cognome) AS nome_completo,
  EXTRACT(MONTH FROM o.data_ordine) AS mese_ordine,
  CAST(o.importo AS INT) AS importo_intero,
  COALESCE(c.telefono, c.email, 'N/D') AS contatto,
  CASE
    WHEN o.importo > 1000 THEN 'Alto'
    WHEN o.importo > 500 THEN 'Medio'
    ELSE 'Basso'
  END AS fascia_importo,
  o.rn_importo,
  COUNT(*) AS totale_righe,
  SUM(o.importo) AS fatturato_totale,
  AVG(o.importo) AS importo_medio
FROM clienti_filtrati c
INNER JOIN ordini_base o ON c.id = o.cliente_id
WHERE c.email IS NOT NULL
  AND c.nome LIKE 'A%'
GROUP BY
  c.id, c.nome, c.cognome, c.città, c.email, c.telefono,
  o.id, o.importo, o.data_ordine, o.rn_importo
HAVING COUNT(*) >= 1
ORDER BY fatturato_totale DESC, nome_completo ASC
LIMIT 20 OFFSET 0`
};

function loadExample(key) {
  document.getElementById('sql').value = EXAMPLES[key];
  analyze();
}
